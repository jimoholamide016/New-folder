<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --card: #fff8ee;
      --ink: #1a1206;
      --accent: #e8470a;
      --accent2: #f5b400;
      --done: #b0a898;
      --border: #e0d8cc;
      --shadow: 0 4px 0 #c8bfb0;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 32px;
    }

    .tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    h1 span {
      color: var(--accent);
    }

    .counter-bar {
      margin-top: 10px;
      font-size: 13px;
      color: var(--done);
      font-weight: 500;
      letter-spacing: 0.02em;
      min-height: 20px;
      transition: color 0.2s;
    }

    .counter-bar strong {
      color: var(--accent);
    }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #task-input {
      flex: 1;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #task-input::placeholder { color: #c0b8ac; }

    #task-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 4px 0 #b08a00;
    }

    #add-btn {
      padding: 14px 22px;
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 4px 0 #9e2f04;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    #add-btn:hover { background: #d03d06; }

    #add-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #9e2f04;
    }

    /* ── Error message ── */
    .error-msg {
      font-size: 12.5px;
      color: var(--accent);
      font-weight: 500;
      margin-top: -16px;
      margin-bottom: 16px;
      min-height: 18px;
      padding-left: 4px;
      letter-spacing: 0.01em;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.visible { opacity: 1; }

    /* ── Task list ── */
    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 16px;
      box-shadow: var(--shadow);
      animation: slideIn 0.22s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      transition: opacity 0.2s, transform 0.2s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .task-item.removing {
      opacity: 0;
      transform: translateX(20px) scale(0.96);
    }

    /* Checkbox-style toggle */
    .task-check {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-check:hover { border-color: var(--accent2); }

    .task-item.completed .task-check {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 15px;
      cursor: pointer;
      line-height: 1.4;
      transition: color 0.2s, text-decoration 0.2s;
      word-break: break-word;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--done);
    }

    /* Delete button */
    .delete-btn {
      width: 28px;
      height: 28px;
      min-width: 28px;
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 7px;
      color: #c0b0a4;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    .delete-btn:hover {
      background: #fdeae3;
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 0 20px;
      color: #c0b8ac;
      font-size: 14px;
      display: none;
    }

    .empty-state .emoji { font-size: 32px; display: block; margin-bottom: 10px; }

    #task-list:empty + .empty-state { display: block; }

    /* ── Footer ── */
    .clear-row {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      color: #b0a898;
      cursor: pointer;
      padding: 4px 2px;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: color 0.15s, text-decoration-color 0.15s;
    }

    .clear-btn:hover {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="tag">✦ Organise</div>
      <h1>My To-Do <span>List</span></h1>
      <p class="counter-bar" id="counter"></p>
    </header>

    <div class="input-row">
      <input
        type="text"
        id="task-input"
        placeholder="What needs to be done?"
        autocomplete="off"
        maxlength="120"
      />
      <button id="add-btn">Add +</button>
    </div>
    <p class="error-msg" id="error-msg"></p>

    <ul id="task-list"></ul>
    <div class="empty-state">
      <span class="emoji">🗒️</span>
      No tasks yet — add something above!
    </div>

    <div class="clear-row">
      <button class="clear-btn" id="clear-done-btn">Clear completed</button>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────
    let tasks = loadTasks();   // [{id, text, completed}]

    // ── DOM refs ───────────────────────────────────────
    const input       = document.getElementById('task-input');
    const addBtn      = document.getElementById('add-btn');
    const list        = document.getElementById('task-list');
    const counter     = document.getElementById('counter');
    const errorMsg    = document.getElementById('error-msg');
    const clearDoneBtn= document.getElementById('clear-done-btn');

    // ── Init ───────────────────────────────────────────
    render();

    // ── Event listeners ────────────────────────────────
    addBtn.addEventListener('click', handleAdd);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAdd();
    });

    clearDoneBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.completed);
      save();
      render();
    });

    // ── Core functions ─────────────────────────────────

    function handleAdd() {
      const text = input.value.trim();

      // Ignore empty inputs
      if (!text) {
        showError('Please enter a task first.');
        input.focus();
        return;
      }

      // Bonus: Prevent duplicates (case-insensitive)
      const duplicate = tasks.some(t => t.text.toLowerCase() === text.toLowerCase());
      if (duplicate) {
        showError('That task already exists!');
        input.select();
        return;
      }

      clearError();
      tasks.push({ id: Date.now(), text, completed: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function deleteTask(id) {
      const li = document.querySelector(`[data-id="${id}"]`);
      if (li) {
        li.classList.add('removing');
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== id);
          save();
          render();
        }, 200);
      }
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        save();
        render();
      }
    }

    // ── Render ─────────────────────────────────────────

    function render() {
      list.innerHTML = '';

      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.completed ? ' completed' : '');
        li.dataset.id = task.id;

        // Checkbox toggle
        const check = document.createElement('button');
        check.className = 'task-check';
        check.setAttribute('aria-label', task.completed ? 'Mark incomplete' : 'Mark complete');
        check.innerHTML = task.completed ? '✓' : '';
        check.addEventListener('click', () => toggleTask(task.id));

        // Task text
        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;
        span.title = 'Click to toggle done';
        span.addEventListener('click', () => toggleTask(task.id));

        // Delete button
        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '✕';
        del.setAttribute('aria-label', 'Delete task');
        del.addEventListener('click', () => deleteTask(task.id));

        li.append(check, span, del);
        list.appendChild(li);
      });

      updateCounter();
    }

    function updateCounter() {
      const left = tasks.filter(t => !t.completed).length;
      const total = tasks.length;
      if (total === 0) {
        counter.innerHTML = '';
      } else {
        counter.innerHTML = `<strong>${left}</strong> task${left !== 1 ? 's' : ''} left · ${total} total`;
      }
    }

    // ── Error helpers ──────────────────────────────────

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      clearTimeout(showError._timer);
      showError._timer = setTimeout(clearError, 3000);
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    // ── LocalStorage ───────────────────────────────────

    function save() {
      localStorage.setItem('todo_tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem('todo_tasks')) || [];
      } catch {
        return [];
      }
    }
  </script>
</body>
</html>
